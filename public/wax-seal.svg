<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Heritage Strategies wax-seal monogram">
  <defs>
    <radialGradient id="wax-body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="hsl(22 65% 58%)"/>
      <stop offset="55%" stop-color="hsl(20 55% 48%)"/>
      <stop offset="100%" stop-color="hsl(15 50% 30%)"/>
    </radialGradient>
    <radialGradient id="wax-shine" cx="38%" cy="32%" r="22%">
      <stop offset="0%" stop-color="hsl(28 75% 78% / 0.85)"/>
      <stop offset="100%" stop-color="hsl(28 75% 78% / 0)"/>
    </radialGradient>
    <filter id="wax-bevel" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feOffset in="blur" dx="0" dy="1" result="offset"/>
      <feFlood flood-color="hsl(15 60% 15%)" flood-opacity="0.4"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#wax-bevel)">
    <path d="M100 12
             C 140 12 174 36 184 76
             C 192 110 178 148 144 168
             C 116 184 78 184 52 168
             C 20 148 10 110 16 76
             C 24 36 60 12 100 12 Z"
          fill="url(#wax-body)" stroke="hsl(15 55% 22%)" stroke-width="2"/>
  </g>
  <ellipse cx="80" cy="68" rx="34" ry="22" fill="url(#wax-shine)"/>
  <g font-family="'Cormorant Garamond', Cormorant, Garamond, serif" font-weight="600" fill="hsl(15 60% 18%)">
    <text x="56" y="126" font-size="62" letter-spacing="-2">H</text>
    <text x="100" y="138" font-size="62" letter-spacing="-2">S</text>
  </g>
  <line x1="50" y1="146" x2="150" y2="146" stroke="hsl(15 60% 18%)" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
</svg>
